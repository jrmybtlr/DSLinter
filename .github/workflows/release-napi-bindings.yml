name: Release NAPI bindings

# Builds @dslinter/binding-* platform packages and publishes dslinter to npm on tag v*.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  APP_NAME: dslinter
  MACOSX_DEPLOYMENT_TARGET: "11.0"
  CARGO_INCREMENTAL: "0"

permissions:
  contents: read
  id-token: write

concurrency:
  group: release-napi-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build-${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # One macOS runner, both darwin targets (macos-13 retired; avoids 2x queue).
          - host: macos-latest
            target: darwin
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            build_flags: --use-napi-cross
          - host: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            build_flags: --use-napi-cross
          # Pin before windows-latest → windows-2025 redirect (June 2026).
          - host: windows-2025
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.host }}
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5
        with:
          version: 9

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target == 'darwin' && 'aarch64-apple-darwin,x86_64-apple-darwin' || matrix.target }}

      - name: Install mold linker (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y mold clang

      - uses: Swatinem/rust-cache@v2
        with:
          cache-targets: "true"

      - run: pnpm install --frozen-lockfile --no-optional --ignore-scripts

      - name: Build native binding
        shell: bash
        run: |
          build_one() {
            pnpm exec napi build \
              --platform \
              --release \
              --target "$1" \
              --cwd . \
              --output-dir packages/dashboard \
              --package-json-path packages/dashboard/package.json \
              --js-package-name @dslinter/binding \
              --js index.cjs \
              --no-default-features \
              --features napi \
              "${@:2}"
          }
          if [ "${{ matrix.target }}" = "darwin" ]; then
            build_one aarch64-apple-darwin
            build_one x86_64-apple-darwin
          else
            build_one "${{ matrix.target }}" ${{ matrix.build_flags }}
          fi

      - uses: actions/upload-artifact@v7
        with:
          name: bindings-${{ matrix.target }}
          path: |
            packages/dashboard/${{ env.APP_NAME }}.*.node
          if-no-files-found: error

  publish:
    name: Publish npm packages
    needs: build
    runs-on: ubuntu-latest
    env:
      # Provenance + CI retry same version → TLOG_CREATE_ENTRY_ERROR (409)
      NPM_CONFIG_PROVENANCE: "false"
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5
        with:
          version: 9

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - run: pnpm install --frozen-lockfile --ignore-scripts

      - uses: dtolnay/rust-toolchain@stable

      - name: Install mold linker (Linux)
        run: sudo apt-get update && sudo apt-get install -y mold clang

      - name: Run package tests before publish
        run: pnpm --filter dslinter test

      - name: Build bundled dashboard SPA
        run: pnpm --filter dslinter run build:dashboard

      - name: Generate index.cjs loader
        run: pnpm run build:napi

      - name: Create per-platform npm package directories
        run: |
          pnpm exec napi create-npm-dirs \
            --cwd . \
            --package-json-path packages/dashboard/package.json \
            --npm-dir npm

      - uses: actions/download-artifact@v7
        with:
          path: artifacts
          merge-multiple: true

      - name: Place bindings into npm dirs
        shell: bash
        run: |
          shopt -s nullglob
          for f in artifacts/${{ env.APP_NAME }}.*.node; do
            cp "$f" packages/dashboard/
          done
          for f in artifacts/*/${{ env.APP_NAME }}.*.node; do
            cp "$f" packages/dashboard/
          done
          ls -la packages/dashboard/*.node
          pnpm exec napi artifacts \
            --cwd . \
            --package-json-path packages/dashboard/package.json \
            --npm-dir npm

      - name: Sync optionalDependencies for dslinter
        run: |
          pnpm exec napi prepublish \
            --cwd . \
            --package-json-path packages/dashboard/package.json \
            --npm-dir npm \
            --no-gh-release \
            --skip-optional-publish

      - name: Verify npm publish credentials
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "::error::NPM_TOKEN secret is missing. Add an npm Automation token (or Granular token with Read and Write on the full @dslinter scope: every @dslinter/binding-* package plus dslinter). See CONTRIBUTING.md."
            exit 1
          fi
          npm config set @dslinter:registry https://registry.npmjs.org/
          if ! user=$(npm whoami); then
            echo "::error::npm whoami failed — NPM_TOKEN is expired, revoked, or invalid (publish steps would fail with 404)."
            echo "::error::Fix: create a new token at https://www.npmjs.com/settings/tokens then run: gh secret set NPM_TOKEN --repo ${{ github.repository }}"
            exit 1
          fi
          echo "npm user: ${user}"
          pkg=$(node -p "require('./packages/dashboard/package.json').name")
          ver=$(node -p "require('./packages/dashboard/package.json').version")
          echo "Will publish ${pkg}@${ver} and @dslinter/binding-*@${ver}"

      - name: Publish platform bindings
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          npm config set @dslinter:registry https://registry.npmjs.org/
          for dir in npm/*/; do
            [ -d "$dir" ] || continue
            name=$(node -p "require('./${dir}package.json').name")
            echo "::group::Publish ${name}"
            (cd "$dir" && npm publish --access public)
            echo "::endgroup::"
          done

      - name: Publish dslinter
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          pnpm --filter dslinter publish --access public --no-git-checks --ignore-scripts
