name: Tests

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  rust:
    name: Rust tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run Rust tests
        run: cargo test

  typescript:
    name: TypeScript checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install mold linker (Linux)
        run: sudo apt-get update && sudo apt-get install -y mold clang

      - uses: Swatinem/rust-cache@v2

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build NAPI binding (linux x64)
        run: pnpm run build:napi

      - name: Run TypeScript lint
        run: pnpm run lint

      - name: Run dashboard tests
        run: pnpm --filter dslinter test

      - name: Smoke-test dslinter CLI via NAPI
        run: node packages/dashboard/bin/dslinter.mjs --version

      - name: Build demo
        run: pnpm --filter dslint-demo run build
