name: Release dslinter binaries

# Uploads prebuilt `dslinter` CLI binaries to the GitHub Release for tag `v*`.
# Keep this workflow on main before tagging; npm `dslinter` downloads these assets.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.0.16)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-dslinter-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: true

env:
  RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}

jobs:
  build:
    name: build-${{ matrix.asset }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            asset: dslinter-x86_64-unknown-linux-gnu
            ext: ""
          - runner: macos-latest
            asset: dslinter-aarch64-apple-darwin
            ext: ""
          - runner: windows-latest
            asset: dslinter-x86_64-pc-windows-msvc.exe
            ext: .exe
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Build dslinter
        run: cargo build --release --bin dslinter

      - name: Package binary
        shell: bash
        run: |
          if [ -n "${{ matrix.ext }}" ]; then
            cp "target/release/dslinter${{ matrix.ext }}" "${{ matrix.asset }}"
          else
            cp target/release/dslinter "${{ matrix.asset }}"
            strip "${{ matrix.asset }}" || true
          fi
          ls -la "${{ matrix.asset }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: assets
          merge-multiple: false

      - name: Flatten artifact paths
        run: |
          find assets -type f -exec mv {} assets/ \;
          find assets -type d -empty -delete 2>/dev/null || true
          ls -la assets/
          count=$(find assets -maxdepth 1 -type f | wc -l)
          test "$count" -ge 1

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TAG }}
          files: assets/*
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
