name: Release dslinter binaries

# Uploads prebuilt `dslinter` CLI binaries to the GitHub Release for tag `v*`.
# Uses Actions v5 (Node 24 runtime) — not the deprecated Node 20 action runtime.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.0.16)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-dslinter-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: true

env:
  RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}

jobs:
  build:
    name: build-${{ matrix.asset }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            asset: dslinter-x86_64-unknown-linux-gnu
            ext: ""
          - runner: macos-latest
            asset: dslinter-aarch64-apple-darwin
            ext: ""
          - runner: windows-latest
            asset: dslinter-x86_64-pc-windows-msvc.exe
            ext: .exe
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ env.RELEASE_TAG }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Build dslinter
        run: cargo build --release --bin dslinter

      - name: Package binary
        shell: bash
        run: |
          if [ -n "${{ matrix.ext }}" ]; then
            cp "target/release/dslinter${{ matrix.ext }}" "${{ matrix.asset }}"
          else
            cp target/release/dslinter "${{ matrix.asset }}"
            strip "${{ matrix.asset }}" || true
          fi
          ls -la "${{ matrix.asset }}"

      - uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v5
        with:
          path: assets
          merge-multiple: true

      # download-artifact lays out one subfolder per artifact name; hoist files to assets/
      - name: Prepare release assets
        shell: bash
        run: |
          shopt -s nullglob
          for dir in assets/dslinter-*/; do
            [ -d "$dir" ] || continue
            name=$(basename "$dir")
            if [ -f "$dir/$name" ]; then
              mv "$dir/$name" "assets/$name"
            else
              file=$(find "$dir" -type f | head -1)
              [ -n "$file" ] && mv "$file" "assets/$name"
            fi
            rm -rf "$dir"
          done
          ls -la assets/
          test -f assets/dslinter-x86_64-unknown-linux-gnu
          test -f assets/dslinter-aarch64-apple-darwin
          test -f assets/dslinter-x86_64-pc-windows-msvc.exe

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TAG }}
          files: assets/*
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
